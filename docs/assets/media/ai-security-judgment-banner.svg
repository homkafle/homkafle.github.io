<svg width="1200" height="600" viewBox="0 0 1200 600" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="AI-assisted security judgment banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="600" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F172A"/>
      <stop offset="0.52" stop-color="#111827"/>
      <stop offset="1" stop-color="#0B1220"/>
    </linearGradient>
    <linearGradient id="accent" x1="180" y1="120" x2="1020" y2="500" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38BDF8"/>
      <stop offset="1" stop-color="#22C55E"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.13 0 0 0 0 0.59 0 0 0 0 0.95 0 0 0 0.35 0"/>
    </filter>
  </defs>

  <rect width="1200" height="600" rx="36" fill="url(#bg)"/>
  <circle cx="980" cy="120" r="130" fill="#1D4ED8" fill-opacity="0.12" filter="url(#glow)"/>
  <circle cx="220" cy="500" r="160" fill="#10B981" fill-opacity="0.08" filter="url(#glow)"/>
  <path d="M170 160C340 110 460 110 610 160C760 210 860 220 1030 170" stroke="url(#accent)" stroke-width="3" stroke-linecap="round" stroke-dasharray="1 14" opacity="0.7"/>
  <path d="M160 430C320 380 460 380 610 430C760 480 880 485 1040 440" stroke="#94A3B8" stroke-opacity="0.24" stroke-width="2" stroke-linecap="round" stroke-dasharray="2 12"/>

  <g transform="translate(110 120)">
    <rect x="0" y="0" width="390" height="360" rx="28" fill="#FFFFFF" fill-opacity="0.04" stroke="#E2E8F0" stroke-opacity="0.14"/>
    <circle cx="80" cy="84" r="24" fill="#1D4ED8" fill-opacity="0.25"/>
    <circle cx="140" cy="84" r="24" fill="#22C55E" fill-opacity="0.25"/>
    <circle cx="200" cy="84" r="24" fill="#38BDF8" fill-opacity="0.25"/>
    <path d="M96 210L180 150L264 210V276C264 304 241 326 213 326H147C119 326 96 304 96 276V210Z" fill="none" stroke="url(#accent)" stroke-width="10" stroke-linejoin="round"/>
    <path d="M180 176V278" stroke="#F8FAFC" stroke-opacity="0.72" stroke-width="10" stroke-linecap="round"/>
    <path d="M132 228H228" stroke="#F8FAFC" stroke-opacity="0.72" stroke-width="10" stroke-linecap="round"/>
  </g>

  <g transform="translate(540 150)">
    <text x="0" y="0" fill="#E2E8F0" font-family="Manrope, Arial, sans-serif" font-size="18" letter-spacing="4">AI-ASSISTED SECURITY</text>
    <text x="0" y="78" fill="#FFFFFF" font-family="Space Grotesk, Arial, sans-serif" font-size="58" font-weight="700" letter-spacing="-1.5">Security judgment</text>
    <text x="0" y="138" fill="#FFFFFF" font-family="Space Grotesk, Arial, sans-serif" font-size="58" font-weight="700" letter-spacing="-1.5">still decides what matters.</text>
    <text x="0" y="206" fill="#CBD5E1" font-family="Manrope, Arial, sans-serif" font-size="24">Discovery gets faster.</text>
    <text x="0" y="242" fill="#CBD5E1" font-family="Manrope, Arial, sans-serif" font-size="24">The human still has to understand the system.</text>
  </g>
</svg>
